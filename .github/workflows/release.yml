name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-24.04' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-24.04' }}
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC) and provenance
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ vars.PNPM_VERSION || 10 }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '24' }}
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      # Trusted Publishing (OIDC) requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      # No token needed: authenticates via OIDC Trusted Publishing,
      # which also generates provenance automatically.
      - name: Publish to npm
        run: npm publish --access public
