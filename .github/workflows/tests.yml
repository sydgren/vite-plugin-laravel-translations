name: Run tests

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - develop

  pull_request:

  workflow_dispatch:
    inputs:
      node-version:
        type: string
        required: false

jobs:
  tests:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-24.04' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ vars.PNPM_VERSION || 10 }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || vars.NODE_VERSION || '24' }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
